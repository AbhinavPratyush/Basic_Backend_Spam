<!DOCTYPE html>
<html>
<head>
  <title>Spam Reporter</title>
</head>
<body>

<h2>Spam Tool</h2>

<input type="text" id="phoneNumber" placeholder="Enter phone number">
<br><br>

<button id="report">Report Spam</button>
<button id="check">Check Score</button>

<p id="response"></p>

<script>
  document.getElementById("report").addEventListener("click", function() {
      const number = document.getElementById("phoneNumber").value;

      fetch(`http://localhost:8080/SpamReport?phoneNumber=${number}`, {
          method: "POST"
      })
      .then(res => res.text())
      .then(data => {
          document.getElementById("response").innerText = data;
      })
      .catch(err => {
          document.getElementById("response").innerText = "Error: " + err;
      });
  });

  document.getElementById("check").addEventListener("click", function() {
      const number = document.getElementById("phoneNumber").value;

      fetch(`http://localhost:8080/CheckScore?phoneNumber=${number}`, {
          method: "POST"
      })
      .then(res => res.text())
      .then(data => {
          document.getElementById("response").innerText = data;
      })
      .catch(err => {
          document.getElementById("response").innerText = "Error: " + err;
      });
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Spam Reporter</title>

</head>
<body>

<h2>Report Spam Number</h2>

<form id="spamForm">
  <label>Phone Number:</label><br>
  <input type="text" id="phoneNumber" name="phoneNumber" required><br><br>

  <button type="submit">Report Spam</button>
</form>
<script>
  document.getElementById("spamForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const number = document.getElementById("phoneNumber").value;

      fetch(`/SpamReport?phoneNumber=${number}`, {
          method: "POST"
      })
      .then(res => res.text())
      .then(data => {
          document.getElementById("response").innerText = "Response: " + data;
      })
      .catch(err => {
          document.getElementById("response").innerText = "Error: " + err;
      });
  });
</script>
<p id="response"></p>



</body>
</html>
